<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SwiftCart | Cart</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../css/cart2.css">
  <link rel="stylesheet" href="../css/global.css" />
</head>
<body>

  <header class="topbar">
      <div class="logo">
        <span class="logo-box"><a href="../index.html">🛒</a></span>
        <span class="logo-text">SwiftCart</span>
      </div>

      <div class="search">
        <span class="search-icon">🔎</span>
        <input id="search" type="text" placeholder="Search products..." />
      </div>

      <div class="links">
        <a href="../index.html">Shop</a>
        <a href="page2.html">Seller Dashboard</a>
        <a class="active" href="rider.html">Rider Portal</a>
      </div>

      <div class="cart"><a href="cart2.html">🛒</a></div>
    </header>

  <!-- Cart Container -->
  <main class="cart-container">

    <header class="cart-header">
      <h1>Your Cart</h1>
      <p>Review your items before checkout</p>
    </header>

    <section class="cart-grid">

      <!-- Cart Items -->
      <div class="cart-items">
        <div class="cart-table-header">
          <span>Product</span>
          <span>Quantity</span>
          <span>Total</span>
        </div>

        <!-- Item 1 -->
        <div class="cart-row">
          <div class="product">
            <div class="icon">📦</div>
            <div>
              <strong>Wireless Bluetooth Headphones</strong>
              <p>#15,000</p>
            </div>
          </div>

          <div class="quantity">
            <button>-</button>
            <span>1</span>
            <button>+</button>
          </div>

          <div class="price">#15,000</div>
        </div>

        <!-- Item 2 -->
        <div class="cart-row">
          <div class="product">
            <div class="icon">📦</div>
            <div>
              <strong>Portable Power Bank</strong>
              <p>#5,000</p>
            </div>
          </div>

          <div class="quantity">
            <button>-</button>
            <span>2</span>
            <button>+</button>
          </div>

          <div class="price">#10,000
        </div>
      </div>

      <!-- Summary -->
      <aside class="summary">
        <h2>Order Summary</h2>

        <div class="summary-row">
          <span>Subtotal</span>
          <span>#30,000</span>
        </div>

        <div class="summary-row">
          <span>Delivery</span>
          <span>#2,000</span>
        </div>

        <div class="summary-row total">
          <span>Total</span>
          <span>#30,000</span>
        </div>

        <button class="checkout"><a href="checkout.html">Proceed to Checkout</a></button>
      </aside>

    </section>

  </main>

</body>
</html>
