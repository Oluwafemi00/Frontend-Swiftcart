<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftCart | Cart</title>
    <link rel="stylesheet" href="../css/cart2.css">
    <link rel="stylesheet" href="../css/global.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">
            <span class="logo-box">🛒 </span>
            <span class="logo-text">SwiftCart</span>
        </div>

        <input type="text" class="search"placeholder="Search Products...">

        <nav class="nav-links">
            <a href="#"><i class="fa-solid fa-store"></i>Shop</a>
            <a href="#"><i class="fa-solid fa-chart-line"></i>Seller Dashboard</a>
            <a href="#"><i class="fa-solid fa-motorcycle"></i>Rider Portal</a>
            <span class="cart-icon"><i class="fa-solid -fa-cart-shopping cart-icon"></i></span>

        </nav>
    </header>

    <main class="cart-container">
        <div class="continue-shopping">
            <a href="../index.html">
            &#8592; Continue Shopping>
            </a>
        </div>
        <div class="cart-box">
            <div class="cart-icon-large">👜 </div>
            <h2>Your cart is empty</h2>
            <p>Looks like you haven't added any items yet.</p>
            <button class="btn"><a href="../index.html">Start Shopping</a></button>
            </div>
        </div>
    </main>
    
</body>
</html>
